<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Bend — OG render</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Fraunces:ital,opsz,wght@1,9..144,500&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  :root{
    --ink:#160c06; --cream:#fff3e2; --orange:#f0531c; --orange-deep:#cf3c0a;
    --amber:#ffa733; --amber-lite:#ffc15a; --peach:#ffc99b; --teal:#1bd6c7; --wood:#7a3d16;
  }
  /* OG canvas */
  .og{
    width:1200px; height:630px; position:relative; overflow:hidden;
    background:radial-gradient(120% 130% at 50% 30%, #2a160a 0%, #0c0603 70%, #000 100%);
    display:flex; align-items:center; justify-content:center; gap:46px;
    font-family:'Righteous',sans-serif;
  }
  /* faint bending stripes behind */
  .og__bands{ position:absolute; inset:-10% -5%; opacity:.5; }
  .og__bands svg{ width:100%; height:100%; }

  /* ===== the TV set ===== */
  .tv{ position:relative; z-index:2; display:flex; gap:26px; padding:34px 34px 40px;
    border-radius:46px;
    background:linear-gradient(155deg,#b9601f 0%, #8a4318 45%, #5e2c0e 100%);
    box-shadow:
      inset 0 4px 0 rgba(255,210,150,.5),
      inset 0 -8px 24px rgba(0,0,0,.5),
      0 40px 80px -20px #000;
  }
  .tv::before{ /* little feet */
    content:""; position:absolute; bottom:-14px; left:60px; right:60px; height:18px;
    background:#3a1c0a; border-radius:0 0 16px 16px; z-index:-1;
    box-shadow:0 10px 20px -6px #000;
  }
  /* antenna */
  .ant{ position:absolute; top:-86px; left:50%; width:2px; height:0; }
  .ant i{ position:absolute; bottom:0; left:0; width:150px; height:5px; background:#caa;
    border-radius:3px; transform-origin:left bottom; box-shadow:0 0 8px rgba(255,255,255,.3); }
  .ant i:first-child{ transform:rotate(-32deg); }
  .ant i:last-child{ transform:rotate(-148deg); }
  .ant b{ position:absolute; bottom:-6px; left:-7px; width:16px; height:16px; border-radius:50%;
    background:#3a1c0a; box-shadow:inset 0 2px 3px rgba(255,255,255,.2); }

  /* ===== screen ===== */
  .screen{ position:relative; width:560px; height:430px; border-radius:34px; overflow:hidden;
    background:#1a0d05;
    box-shadow:inset 0 0 0 10px #2a160a, inset 0 0 60px 12px rgba(0,0,0,.7);
  }
  .sun{ position:absolute; inset:-40%; border-radius:50%;
    background:
      repeating-conic-gradient(from 0deg, rgba(240,83,28,.55) 0 9deg, transparent 9deg 20deg),
      repeating-conic-gradient(from 4deg, rgba(255,167,51,.4) 0 5deg, transparent 5deg 22deg);
  }
  .glow{ position:absolute; inset:0; background:radial-gradient(circle at 50% 46%, rgba(255,200,120,.35), transparent 60%); }
  .screen__in{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:30px; }
  .screen__in img{ width:78%; filter:drop-shadow(0 10px 22px rgba(0,0,0,.55)) drop-shadow(0 0 36px rgba(255,167,51,.5)); }
  .ribbon{ font-family:'Righteous'; text-transform:uppercase; letter-spacing:.26em;
    font-size:18px; color:var(--peach);
    padding:7px 18px; border-radius:999px; border:2px solid rgba(255,167,51,.55);
    background:rgba(240,83,28,.16); }
  .ribbon b{ color:var(--teal); font-weight:400; }
  /* CRT scanlines + curvature highlight */
  .screen::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(180deg, transparent 0 3px, rgba(0,0,0,.22) 3px 6px); }
  .screen::before{ content:""; position:absolute; inset:0; z-index:3; pointer-events:none;
    border-radius:34px; box-shadow:inset 40px 30px 80px rgba(255,255,255,.10), inset -30px -40px 80px rgba(0,0,0,.5); }

  /* ===== control panel ===== */
  .panel{ width:170px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; }
  .brandtab{ font-family:'Righteous'; color:#ffe7c7; font-size:15px; letter-spacing:.18em;
    text-transform:uppercase; opacity:.85; }
  .knob{ width:74px; height:74px; border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #ffd9a8, #6e3410 70%);
    box-shadow:inset 0 -4px 8px rgba(0,0,0,.5), 0 6px 14px -4px #000; position:relative; }
  .knob::after{ content:""; position:absolute; top:8px; left:50%; width:4px; height:22px; margin-left:-2px;
    background:#2a160a; border-radius:3px; }
  .knob.k2::after{ transform:rotate(60deg); transform-origin:50% 28px; }
  .grille{ width:96px; height:60px; border-radius:8px;
    background:repeating-linear-gradient(90deg,#3a1c0a 0 4px, #6e3410 4px 8px);
    box-shadow:inset 0 0 8px rgba(0,0,0,.6); }
  .led{ position:absolute; }

  /* tagline plaque bottom */
  .plaque{ position:absolute; bottom:26px; left:0; right:0; text-align:center; z-index:3;
    font-family:'Righteous'; text-transform:uppercase; letter-spacing:.32em;
    color:#ffd9b0; font-size:18px; opacity:.9; }
  .plaque span{ color:var(--teal); }
</style>
</head>
<body>
<div class="og" id="og">
  <div class="og__bands" aria-hidden="true">
    <svg viewBox="0 0 1200 630" fill="none">
      <path d="M-100 470 Q 500 300 1300 440" stroke="#cf3c0a" stroke-width="90" opacity=".45"/>
      <path d="M-100 520 Q 500 350 1300 490" stroke="#f0531c" stroke-width="90" opacity=".5"/>
      <path d="M-100 570 Q 500 400 1300 540" stroke="#ffa733" stroke-width="90" opacity=".45"/>
      <path d="M-100 620 Q 500 450 1300 590" stroke="#ffc99b" stroke-width="90" opacity=".35"/>
    </svg>
  </div>

  <div class="tv">
    <div class="ant"><i></i><i></i><b></b></div>
    <div class="screen">
      <div class="sun"></div>
      <div class="glow"></div>
      <div class="screen__in">
        <img src="TheBend-Logo-alt.png" alt="The Bend">
        <div class="ribbon"><b>★</b>&nbsp; Est. 2014 · Hialeah, FL &nbsp;<b>★</b></div>
      </div>
    </div>
    <div class="panel">
      <div class="brandtab">The Bend</div>
      <div class="knob k1"></div>
      <div class="knob k2"></div>
      <div class="grille"></div>
    </div>
  </div>

  <div class="plaque">Miami's Grooviest <span>Dive Bar</span></div>
</div>
</body>
</html>
